# Production nginx reverse proxy for the Sydney Real Estate Investment app.
#
# Routing:
#   /api/*    → FastAPI backend (port 8000)
#   /health   → FastAPI backend (port 8000)
#   /         → Next.js frontend (port 3000)
#
# Usage (Docker):
#   The nginx service in docker-compose.yml mounts this file at
#   /etc/nginx/conf.d/default.conf and depends on both backend + frontend.

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ─── Rate-limiting zones ──────────────────────────────────────────────────────
# Limit API requests to 20 req/s per IP (burst to 40)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

# ─── Server block ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/html
        text/css
        text/plain
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── API proxy ──────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;   # long timeout for ML tasks
        proxy_send_timeout    30s;

        # Buffer tuning for API responses
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── Health check (backend, no rate limit) ─────────────────────────────────
    location = /health {
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Next.js static assets (long cache) ───────────────────────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        # Static chunks are content-addressed — cache forever
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Next.js HMR websocket (dev only) ─────────────────────────────────────
    location /_next/webpack-hmr {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Frontend catch-all ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 60s;
    }

    # ── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
